<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --off-black: #111111;
      --dark: #181818;
      --mid: #2a2a2a;
      --text: #f0ece4;
      --muted: #7a7570;
      --accent: #b8a9d4;
      --accent2: #d4cce8;
      --film: #0e0c0b;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
    }

    /* ─── PAGE SYSTEM ─── */
    .page {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
      background: var(--black);
    }
    .page.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ─── GRAIN OVERLAY ─── */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ─── NAV ─── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
      mix-blend-mode: normal;
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 400;
      font-size: 1.4rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      cursor: pointer;
      text-transform: uppercase;
    }
    .nav-links {
      display: flex;
      gap: 2.5rem;
    }
    .nav-link {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.3s;
      background: none; border: none;
    }
    .nav-link:hover, .nav-link.active { color: var(--text); }

    /* ══════════════════════════════
       PAGE 1 — HOME
    ══════════════════════════════ */
    #page-home {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .home-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
      padding: 6rem 2rem 4rem;
      overflow: hidden;
    }

    .hero-video-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .hero-video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-video-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        rgba(8,8,8,0.45) 0%,
        rgba(8,8,8,0.25) 50%,
        rgba(8,8,8,0.8) 100%
      );
    }
    .home-hero > *:not(.hero-video-bg) {
      position: relative;
      z-index: 1;
    }

    /* Cinematic letterbox lines */
    .home-hero::before,
    .home-hero::after {
      content: '';
      position: fixed;
      left: 0; right: 0;
      height: clamp(30px, 5vh, 60px);
      background: #000;
      z-index: 50;
      pointer-events: none;
    }
    .home-hero::before { top: 0; }
    .home-hero::after { bottom: 0; }

    .hero-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s 0.3s forwards;
    }

    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 400;
      font-size: clamp(5rem, 16vw, 14rem);
      line-height: 0.88;
      text-align: center;
      letter-spacing: 0.04em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 1s 0.5s forwards;
    }

    .hero-name em {
      font-style: normal;
      color: var(--accent);
      display: block;
    }

    .hero-tagline {
      margin-top: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s 0.7s forwards;
    }

    .hero-divider {
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      margin: 3rem auto 0;
      opacity: 0;
      animation: fadeUp 1s 1s forwards;
    }

    /* ── Select section ── */
    .select-section {
      padding: clamp(2rem, 5vh, 4rem) 2rem clamp(4rem, 8vh, 8rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .select-label {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s 1.3s forwards;
    }

    .select-cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.8s 1.5s forwards;
      align-items: flex-end;
    }

    /* ── Dynamic Category Card ── */
    .select-card {
      position: relative;
      cursor: pointer;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--off-black);
      transition: border-color 0.35s, transform 0.5s cubic-bezier(0.23,1,0.32,1), box-shadow 0.5s;
    }
    .select-card:hover {
      border-color: var(--accent);
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 30px 80px rgba(184,169,212,0.2), 0 0 0 1px var(--accent);
      z-index: 10;
    }

    /* Short films card — 16:9 */
    .card-films {
      width: clamp(280px, 40vw, 520px);
      aspect-ratio: 16/9;
    }
    /* Social card — 9:16 */
    .card-social {
      width: clamp(140px, 18vw, 240px);
      aspect-ratio: 9/16;
    }

    /* Slideshow layer */
    .card-slideshow {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .card-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.7s ease;
    }
    .card-slide.active { opacity: 1; }

    /* Dark tint — stronger at rest, lifts on hover */
    .card-tint {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: rgba(8,8,8,0.72);
      transition: background 0.4s;
    }
    .select-card:hover .card-tint {
      background: rgba(8,8,8,0.38);
    }

    /* Accent colour bleed on hover */
    .card-bleed {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(135deg, rgba(184,169,212,0.18) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.5s;
    }
    .select-card:hover .card-bleed { opacity: 1; }

    .card-content {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
    }

    .card-type {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
      font-weight: 500;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1;
      letter-spacing: 0.04em;
      color: var(--text);
      transition: color 0.3s;
    }
    .select-card:hover .card-title { color: #fff; }

    .card-arrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.8rem;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s, transform 0.35s;
      font-weight: 600;
    }
    .select-card:hover .card-arrow {
      opacity: 1;
      transform: translateY(0);
    }

    /* Aspect ratio badge */
    .card-ratio {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 3;
      font-size: 0.48rem;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 0.2rem 0.5rem;
      font-weight: 500;
      transition: color 0.3s, border-color 0.3s;
    }
    .select-card:hover .card-ratio {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Slide counter dots */
    .card-dots {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      z-index: 3;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.4s 0.1s;
    }
    .select-card:hover .card-dots { opacity: 1; }
    .card-dot {
      width: 14px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      transition: background 0.3s, width 0.3s;
    }
    .card-dot.active {
      background: var(--accent);
      width: 22px;
    }

    /* ══════════════════════════════
       PAGE 2 — SHORT FILMS
    ══════════════════════════════ */
    #page-films {
      min-height: 100vh;
    }

    .page-header {
      padding: 7rem 3rem 3rem;
      border-bottom: 1px solid var(--mid);
    }

    .page-header-meta {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .page-header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 400;
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: 1;
      letter-spacing: 0.04em;
    }

    .page-header-title em { font-style: normal; color: var(--accent); }

    /* ── Carousel ── */
    .carousel-section {
      padding: 4rem 0;
    }

    .carousel-wrapper {
      position: relative;
    }

    .carousel-track-outer {
      overflow: hidden;
      padding: 1rem 4vw;
    }

    .carousel-track {
      display: flex;
      gap: 2rem;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    /* 16:9 video card */
    .video-card-16 {
      flex: 0 0 clamp(400px, 78vw, 1100px);
      position: relative;
      background: var(--off-black);
      border: 1px solid var(--mid);
      overflow: hidden;
      cursor: grab;
      transition: border-color 0.4s;
    }
    .video-card-16:active { cursor: grabbing; }
    .video-card-16:hover { border-color: var(--accent); }

    .video-embed-16 {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--film);
      position: relative;
      overflow: hidden;
    }

    .video-embed-16 iframe,
    .video-embed-9 iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .video-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background:
        repeating-linear-gradient(90deg, transparent, transparent 47px, rgba(255,255,255,0.02) 48px),
        repeating-linear-gradient(0deg, transparent, transparent 35px, rgba(255,255,255,0.02) 36px),
        var(--film);
    }

    .placeholder-icon {
      width: 48px;
      height: 48px;
      border: 1px solid var(--muted);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 1.2rem;
    }

    .placeholder-text {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .video-card-info {
      padding: 1.2rem 1.5rem;
    }

    .video-card-num {
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .video-card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .video-card-desc {
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Carousel controls */
    .carousel-controls {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem 3rem;
    }

    .carousel-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--mid);
      background: none;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, background 0.3s;
      font-size: 1rem;
    }
    .carousel-btn:hover {
      border-color: var(--accent);
      background: rgba(184,169,212,0.1);
    }
    .carousel-btn:disabled { opacity: 0.2; cursor: default; }

    .carousel-counter {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .carousel-dots {
      display: flex;
      gap: 0.5rem;
      margin-left: auto;
    }
    .dot {
      width: 20px;
      height: 2px;
      background: var(--mid);
      cursor: pointer;
      transition: background 0.3s, width 0.3s;
    }
    .dot.active {
      background: var(--accent);
      width: 36px;
    }

    /* Add / Edit video controls */
    .video-edit-bar {
      padding: 0 3rem 3rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      border-top: 1px solid var(--mid);
      padding-top: 2rem;
    }

    .edit-label {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 0.5rem;
    }

    .edit-input {
      background: var(--off-black);
      border: 1px solid var(--mid);
      color: var(--text);
      font-family: 'Chakra Petch', monospace;
      font-size: 0.7rem;
      padding: 0.5rem 0.8rem;
      outline: none;
      transition: border-color 0.3s;
      flex: 1;
      min-width: 200px;
      max-width: 360px;
    }
    .edit-input:focus { border-color: var(--accent); }
    .edit-input::placeholder { color: var(--muted); }

    .edit-btn {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Chakra Petch', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    .edit-btn:hover { background: var(--accent); color: var(--black); }

    .remove-btn {
      background: none;
      border: 1px solid var(--mid);
      color: var(--muted);
      font-family: 'Chakra Petch', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s;
    }
    .remove-btn:hover { border-color: #c0392b; color: #c0392b; }

    /* ══════════════════════════════
       PAGE 3 — SOCIAL (9:16)
    ══════════════════════════════ */
    #page-social {
      min-height: 100vh;
    }

    /* 9:16 video card */
    .video-card-9 {
      flex: 0 0 clamp(240px, 38vw, 520px);
      position: relative;
      background: var(--off-black);
      border: 1px solid var(--mid);
      overflow: hidden;
      cursor: grab;
      transition: border-color 0.4s;
    }
    .video-card-9:active { cursor: grabbing; }
    .video-card-9:hover { border-color: var(--accent); }

    .video-embed-9 {
      width: 100%;
      aspect-ratio: 9/16;
      background: var(--film);
      position: relative;
      overflow: hidden;
    }

    .video-embed-9 .video-placeholder {
      background:
        repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(255,255,255,0.02) 48px),
        var(--film);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--mid); border-radius: 2px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .nav { padding: 1.2rem 1.5rem; }
      .nav-links { gap: 1.2rem; }
      .select-cards { flex-direction: column; align-items: center; }
      .card-social { width: clamp(180px, 55vw, 260px); }
      .page-header { padding: 6rem 1.5rem 2rem; }
      .carousel-track-outer { padding: 1rem 1.5rem; }
      .carousel-controls, .video-edit-bar { padding-left: 1.5rem; padding-right: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="grain"></div>

<!-- NAV -->
<nav class="nav" id="main-nav">
  <div class="nav-logo" onclick="showPage('home')" id="nav-logo">Nicholas Verone</div>
  <div class="nav-links">
    <button class="nav-link active" id="nav-home" onclick="showPage('home')">Home</button>
    <button class="nav-link" id="nav-films" onclick="showPage('films')">Short Films</button>
    <button class="nav-link" id="nav-social" onclick="showPage('social')">Social</button>
  </div>
</nav>

<!-- ══════ PAGE 1: HOME ══════ -->
<div class="page active" id="page-home">
  <div class="home-hero">
    <div class="hero-video-bg">
      <video autoplay muted loop playsinline src="PORTFOLIOBACKGROUND.mp4"></video>
    </div>
    <p class="hero-eyebrow">Portfolio</p>
    <h1 class="hero-name" id="hero-name-display" data-name="Nicholas Verone">Nicholas<br><em>Verone</em></h1>
    <p class="hero-tagline">Filmmaker &nbsp;·&nbsp; Director &nbsp;·&nbsp; Content Creator</p>
    <div class="hero-divider"></div>
  </div>

  <div class="select-section">
    <p class="select-label">Select a category</p>
    <div class="select-cards">

      <!-- Short Films -->
      <div class="select-card card-films" onclick="showPage('films')" id="card-films"
           onmouseenter="startSlideshow('films')" onmouseleave="stopSlideshow('films')">
        <div class="card-slideshow" id="slideshow-films"></div>
        <div class="card-tint"></div>
        <div class="card-bleed"></div>
        <div class="card-content">
          <span class="card-type">Category 01</span>
          <div class="card-title">Short Films</div>
          <span class="card-arrow">Enter &#8594;</span>
        </div>
        <div class="card-dots" id="dots-films"></div>
      </div>

      <!-- Social Media -->
      <div class="select-card card-social" onclick="showPage('social')" id="card-social"
           onmouseenter="startSlideshow('social')" onmouseleave="stopSlideshow('social')">
        <div class="card-slideshow" id="slideshow-social"></div>
        <div class="card-tint"></div>
        <div class="card-bleed"></div>
        <div class="card-content">
          <span class="card-type">Category 02</span>
          <div class="card-title">Social Media</div>
          <span class="card-arrow">Enter &#8594;</span>
        </div>
        <div class="card-dots" id="dots-social"></div>
      </div>

    </div>
  </div>
</div>

<!-- ══════ PAGE 2: SHORT FILMS ══════ -->
<div class="page" id="page-films">
  <div class="page-header">
    <h2 class="page-header-title">Short<br><em>Films</em></h2>
  </div>

  <div class="carousel-section">
    <div class="carousel-wrapper">
      <div class="carousel-track-outer">
        <div class="carousel-track" id="films-track">
          <!-- Cards injected by JS -->
        </div>
      </div>
      <div class="carousel-controls">
        <button class="carousel-btn" id="films-prev" onclick="moveCarousel('films',-1)">&#8592;</button>
        <button class="carousel-btn" id="films-next" onclick="moveCarousel('films', 1)">&#8594;</button>
        <span class="carousel-counter" id="films-counter">01 / 01</span>
        <div class="carousel-dots" id="films-dots"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════ PAGE 3: SOCIAL MEDIA ══════ -->
<div class="page" id="page-social">
  <div class="page-header">
    <h2 class="page-header-title">Social<br><em>Media</em></h2>
  </div>

  <div class="carousel-section">
    <div class="carousel-wrapper">
      <div class="carousel-track-outer">
        <div class="carousel-track" id="social-track">
          <!-- Cards injected by JS -->
        </div>
      </div>
      <div class="carousel-controls">
        <button class="carousel-btn" id="social-prev" onclick="moveCarousel('social',-1)">&#8592;</button>
        <button class="carousel-btn" id="social-next" onclick="moveCarousel('social', 1)">&#8594;</button>
        <span class="carousel-counter" id="social-counter">01 / 01</span>
        <div class="carousel-dots" id="social-dots"></div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ─── State ─── */

  /*
  ============================================================
  HOW TO ADD VIDEOS TO THE PORTFOLIO
  ============================================================

  SHORT FILMS (16:9 — YouTube / Vimeo):
  Add a new entry inside the `films.videos` array below.
  Each entry needs three fields:

    {
      embedUrl: 'https://www.youtube.com/embed/VIDEO_ID?rel=0&modestbranding=1',
      title:    'Your Film Title',
      date:     'Month DD, YYYY'
    },

  To get the embed URL from a YouTube link:
    - Your link:  https://youtu.be/ABC123  or  https://youtube.com/watch?v=ABC123
    - Embed URL:  https://www.youtube.com/embed/ABC123?rel=0&modestbranding=1
    (just swap the video ID — the part after /embed/)

  For Vimeo:
    - Your link:  https://vimeo.com/123456789
    - Embed URL:  https://player.vimeo.com/video/123456789

  Videos are listed oldest → newest. Add new entries at the BOTTOM of the array.
  If a video is not yet released, set embedUrl to null and it will show a placeholder.

  SOCIAL MEDIA (9:16 — same format, inside `social.videos`):
  Same process — add entries to the social.videos array.

  ============================================================
  */

  const state = {
    films: {
      index: 0,
      videos: [
        // ── TBD — not yet released, shows placeholder ──
        {

        },

        },
        // ── July 31, 2025 ──

        },
        // ── May 16, 2024 ──
        {

          title: 'i want to go outside',

        },

        },

        },
        // ── July 8, 2023 ──

          title: 'Crusade Trailer',

        },
        // ── ADD NEW SHORT FILMS BELOW THIS LINE ──
      ]
    },
    social: {
      index: 0,
      videos: [
        // ── March 17, 2026 ──
        {

        },
        // ── February 10, 2026 ──
        {

        },

        },

        {

          title: 'Social',
          date: 'July 25, 2025'
        },
        // ── ADD NEW SOCIAL MEDIA VIDEOS BELOW THIS LINE ──
      ]
    },
  };

  /* ─── Page Navigation ─── */
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
    document.getElementById('page-' + name).scrollTop = 0;
  }

  /* ─── Thumbnail Slideshow for Category Cards ─── */
  // YouTube thumbnail URLs — one per film (highest quality available)
  const thumbnails = {
    films: [
      'https://img.youtube.com/vi/UxVrfoAQiKU/maxresdefault.jpg',
      'https://img.youtube.com/vi/ghQirsnBC_k/maxresdefault.jpg',
      'https://img.youtube.com/vi/nzv4sVAIJQc/maxresdefault.jpg',
      'https://img.youtube.com/vi/Nq3Ow345_PE/maxresdefault.jpg',
      'https://img.youtube.com/vi/mV0eVN65dUY/maxresdefault.jpg',
      'https://img.youtube.com/vi/5RV9pHozyoU/maxresdefault.jpg',
      'https://img.youtube.com/vi/yAgm8ZhsW_4/maxresdefault.jpg',
      'https://img.youtube.com/vi/7jeJLBABdaM/maxresdefault.jpg',
      'https://img.youtube.com/vi/_m4KfWX4dNQ/maxresdefault.jpg',
      'https://img.youtube.com/vi/TCObXC6h3BM/maxresdefault.jpg',
    ],
    social: [
      'https://img.youtube.com/vi/6mDi5-hdaic/maxresdefault.jpg',
      'https://img.youtube.com/vi/UMnwrqMos8k/maxresdefault.jpg',
      'https://img.youtube.com/vi/Fs__fO_Gkoc/maxresdefault.jpg',
      'https://img.youtube.com/vi/CYREVwGJILI/maxresdefault.jpg',
    ]
  };

  const slideshowState = { films: { index: 0, timer: null }, social: { index: 0, timer: null } };

  function buildSlideshows() {
    ['films', 'social'].forEach(type => {
      const container = document.getElementById('slideshow-' + type);
      const dotsEl    = document.getElementById('dots-' + type);
      const imgs      = thumbnails[type];
      if (!imgs.length) {
        // Fallback dark pattern if no thumbnails
        container.innerHTML = `<div class="card-slide active" style="background:#0e0c0b;"></div>`;
        return;
      }
      container.innerHTML = imgs.map((src, i) =>
        `<div class="card-slide${i===0?' active':''}" style="background-image:url('${src}')"></div>`
      ).join('');
      dotsEl.innerHTML = imgs.map((_, i) =>
        `<div class="card-dot${i===0?' active':''}"></div>`
      ).join('');
    });
  }

  function setSlide(type, index) {
    const slides = document.querySelectorAll(`#slideshow-${type} .card-slide`);
    const dots   = document.querySelectorAll(`#dots-${type} .card-dot`);
    slides.forEach((s, i) => s.classList.toggle('active', i === index));
    dots.forEach((d, i)   => d.classList.toggle('active', i === index));
    slideshowState[type].index = index;
  }

  function startSlideshow(type) {
    const imgs = thumbnails[type];
    if (imgs.length < 2) return;
    stopSlideshow(type);
    slideshowState[type].timer = setInterval(() => {
      const next = (slideshowState[type].index + 1) % imgs.length;
      setSlide(type, next);
    }, 900);
  }

  function stopSlideshow(type) {
    clearInterval(slideshowState[type].timer);
    slideshowState[type].timer = null;
    setSlide(type, 0);
  }

  buildSlideshows();

  /* ─── Build Card HTML ─── */
  function buildCard(type, video, index) {
    const cardClass = type === 'films' ? 'video-card-16' : 'video-card-9';
    const embedClass = type === 'films' ? 'video-embed-16' : 'video-embed-9';

    let mediaHTML;
    if (video.embedUrl) {
      mediaHTML = `<iframe src="${video.embedUrl}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
    } else {
      mediaHTML = `
        <div class="video-placeholder">
          <div class="placeholder-icon">▶</div>
          <span class="placeholder-text">Coming Soon</span>
        </div>`;
    }

    return `
      <div class="${cardClass}">
        <div class="${embedClass}">${mediaHTML}</div>
        <div class="video-card-info">
          <div class="video-card-num">${video.date || ''}</div>
          <div class="video-card-title">${video.title || 'Untitled'}</div>
          ${video.desc ? `<div class="video-card-desc">${video.desc}</div>` : ''}
        </div>
      </div>`;
  }

  /* ─── Render Carousel ─── */
  function renderCarousel(type) {
    const s = state[type];
    const track = document.getElementById(type + '-track');
    const dotsEl = document.getElementById(type + '-dots');
    const counter = document.getElementById(type + '-counter');

    if (s.videos.length === 0) {
      track.innerHTML = buildCard(type, {title: 'Coming Soon'}, 0);
      dotsEl.innerHTML = '<div class="dot active"></div>';
      counter.textContent = '01 / 01';
      updateCarouselButtons(type);
      return;
    }

    track.innerHTML = s.videos.map((v, i) => buildCard(type, v, i)).join('');
    dotsEl.innerHTML = s.videos.map((_, i) =>
      `<div class="dot ${i === s.index ? 'active' : ''}" onclick="goToSlide('${type}',${i})"></div>`
    ).join('');
    counter.textContent = String(s.index + 1).padStart(2,'0') + ' / ' + String(s.videos.length).padStart(2,'0');
    applyCarouselTransform(type);
    updateCarouselButtons(type);
    initDrag(type);
  }

  function applyCarouselTransform(type) {
    const track = document.getElementById(type + '-track');
    const cards = track.children;
    if (!cards.length) return;
    const s = state[type];
    const cardW = cards[0].offsetWidth;
    const gap = 32;
    track.style.transform = `translateX(-${s.index * (cardW + gap)}px)`;

    document.querySelectorAll(`#${type}-dots .dot`).forEach((d, i) => {
      d.classList.toggle('active', i === s.index);
    });
    document.getElementById(type + '-counter').textContent =
      String(s.index + 1).padStart(2,'0') + ' / ' + String(s.videos.length).padStart(2,'0');
  }

  function updateCarouselButtons(type) {
    const s = state[type];
    const len = Math.max(s.videos.length, 1);
    document.getElementById(type + '-prev').disabled = s.index === 0;
    document.getElementById(type + '-next').disabled = s.index >= len - 1;
  }

  function moveCarousel(type, dir) {
    const s = state[type];
    const len = Math.max(s.videos.length, 1);
    s.index = Math.max(0, Math.min(len - 1, s.index + dir));
    applyCarouselTransform(type);
    updateCarouselButtons(type);
  }

  function goToSlide(type, i) {
    state[type].index = i;
    applyCarouselTransform(type);
    updateCarouselButtons(type);
  }

  /* ─── Drag to Slide ─── */
  function initDrag(type) {
    const outer = document.getElementById(type + '-track').parentElement;
    let startX = 0, dragDelta = 0, dragging = false;

    function onDown(e) {
      dragging = true;
      startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
      dragDelta = 0;
      outer.style.cursor = 'grabbing';
    }
    function onMove(e) {
      if (!dragging) return;
      const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
      dragDelta = x - startX;
      const track = document.getElementById(type + '-track');
      const cards = track.children;
      if (!cards.length) return;
      const cardW = cards[0].offsetWidth;
      const gap = 32;
      const base = state[type].index * (cardW + gap);
      track.style.transition = 'none';
      track.style.transform = `translateX(${-base + dragDelta}px)`;
    }
    function onUp() {
      if (!dragging) return;
      dragging = false;
      outer.style.cursor = '';
      const track = document.getElementById(type + '-track');
      track.style.transition = '';
      const threshold = 60;
      if (dragDelta < -threshold) moveCarousel(type, 1);
      else if (dragDelta > threshold) moveCarousel(type, -1);
      else applyCarouselTransform(type);
      dragDelta = 0;
    }

    // Remove old listeners by cloning
    const fresh = outer.cloneNode(false);
    outer.parentNode.replaceChild(fresh, outer);
    // Re-append children
    while (outer.firstChild) fresh.appendChild(outer.firstChild);

    fresh.addEventListener('mousedown',  onDown);
    fresh.addEventListener('mousemove',  onMove);
    fresh.addEventListener('mouseup',    onUp);
    fresh.addEventListener('mouseleave', onUp);
    fresh.addEventListener('touchstart', onDown, { passive: true });
    fresh.addEventListener('touchmove',  onMove, { passive: true });
    fresh.addEventListener('touchend',   onUp);
    fresh.style.cursor = 'grab';
    fresh.style.userSelect = 'none';
  }

  /* ─── Init ─── */
  renderCarousel('films');
  renderCarousel('social');

  window.addEventListener('resize', () => {
    applyCarouselTransform('films');
    applyCarouselTransform('social');
  });
</script>
